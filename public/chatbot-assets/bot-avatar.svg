<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="botGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66FCF1"/>
      <stop offset="100%" style="stop-color:#45A29E"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#botGradient)" opacity="0.2"/>
  <circle cx="100" cy="100" r="80" fill="#1F2833" stroke="url(#botGradient)" stroke-width="3"/>
  <!-- Robot face -->
  <rect x="70" y="65" width="25" height="25" rx="5" fill="url(#botGradient)"/>
  <rect x="105" y="65" width="25" height="25" rx="5" fill="url(#botGradient)"/>
  <path d="M 75 130 Q 100 150 125 130" stroke="url(#botGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <rect x="85" y="95" width="30" height="8" rx="4" fill="url(#botGradient)" opacity="0.7"/>
  <!-- Antenna -->
  <line x1="100" y1="20" x2="100" y2="5" stroke="url(#botGradient)" stroke-width="3"/>
  <circle cx="100" cy="5" r="5" fill="url(#botGradient)"/>
</svg>
